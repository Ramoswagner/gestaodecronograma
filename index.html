<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Project Pulse BI | Dashboard Real-Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f4f7f1;
            --primary: #63783D;  /* Verde Escuro */
            --accent: #7FA653;   /* Verde Médio */
            --light-green: #CFE0BC;
            --soft-green: #99CD85;
            --dark: #233022;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1200px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-area { display: flex; gap: 10px; }
        input { padding: 12px; border: 2px solid var(--light-green); border-radius: 8px; width: 350px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--dark); transform: translateY(-2px); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .full-width { grid-column: span 3; }
        
        h3 { margin-top: 0; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--light-green); color: var(--primary); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .over-budget { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; color: var(--primary);">Project Pulse</h1>
            <small>Panorama Dinâmico de Projetos</small>
        </div>
        <div class="input-area">
            <input type="text" id="csvUrl" placeholder="Cole o link do CSV Publicado aqui...">
            <button onclick="fetchData()">Atualizar BI</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Saúde Financeira</h3>
            <canvas id="financeChart"></canvas>
        </div>

        <div class="card">
            <h3>Progresso Geral</h3>
            <div id="avgProgress" style="font-size: 48px; font-weight: bold; text-align: center; margin-top: 20px; color: var(--accent);">0%</div>
            <p style="text-align: center; color: #666;">Média de conclusão do projeto</p>
        </div>

        <div class="card">
            <h3>Tarefas</h3>
            <div id="taskCount" style="font-size: 48px; font-weight: bold; text-align: center; margin-top: 20px; color: var(--primary);">0</div>
            <p style="text-align: center; color: #666;">Total de atividades listadas</p>
        </div>

        <div class="card full-width">
            <h3>Detalhamento das Atividades</h3>
            <table id="projectTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Atividade</th>
                        <th>Responsável</th>
                        <th>Prazo</th>
                        <th>Custo Real</th>
                        <th>Progresso</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center;">Insira o link e clique em Atualizar</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let financeChart = null;

async function fetchData() {
    const url = document.getElementById('csvUrl').value;
    if(!url.includes("output=csv")) {
        alert("Atenção: Use o link de 'Publicar na Web' com formato CSV!");
        return;
    }

    try {
        const response = await fetch(url);
        const csvData = await response.text();
        const rows = csvData.split('\n').map(row => row.split(',')).slice(1);

        let totalPrevisto = 0;
        let totalReal = 0;
        let progressoSoma = 0;
        let tableHtml = "";

        rows.forEach(cols => {
            if(cols.length < 5) return;

            const cPrevisto = parseFloat(cols[7]) || 0;
            const cReal = parseFloat(cols[8]) || 0;
            const prog = parseInt(cols[9]) || 0;
            
            totalPrevisto += cPrevisto;
            totalReal += cReal;
            progressoSoma += prog;

            const isOver = cReal > cPrevisto ? 'over-budget' : '';

            tableHtml += `
                <tr>
                    <td>${cols[0]}</td>
                    <td><strong>${cols[1]}</strong></td>
                    <td>${cols[2]}</td>
                    <td>${cols[4]}</td>
                    <td class="${isOver}">R$ ${cReal.toFixed(2)}</td>
                    <td>
                        <div style="background: #eee; border-radius: 5px; height: 10px; width: 100px;">
                            <div style="background: var(--accent); width: ${prog}%; height: 100%; border-radius: 5px;"></div>
                        </div>
                        ${prog}%
                    </td>
                </tr>`;
        });

        document.getElementById('tableBody').innerHTML = tableHtml;
        document.getElementById('taskCount').innerText = rows.length;
        document.getElementById('avgProgress').innerText = Math.round(progressoSoma / rows.length) + "%";

        updateChart(totalPrevisto, totalReal);

    } catch (e) {
        alert("Erro ao conectar com a planilha. Verifique as permissões.");
    }
}

function updateChart(previsto, real) {
    const ctx = document.getElementById('financeChart').getContext('2d');
    if(financeChart) financeChart.destroy();
    
    financeChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Gasto Real', 'Orçamento Restante'],
            datasets: [{
                data: [real, previsto > real ? previsto - real : 0],
                backgroundColor: ['#63783D', '#CFE0BC']
            }]
        },
        options: { cutout: '70%' }
    });
}
</script>
</body>
</html>
